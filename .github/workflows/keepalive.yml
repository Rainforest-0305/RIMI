name: keepalive-ping
# Render 무료 티어 콜드스타트 완화: 10분마다 헬스 엔드포인트 핑(WS-2, President 승인 2026-07-16).
# GitHub Actions cron 은 수 분 지연될 수 있으나 Render 슬립 임계(15분 무접속)보다 짧아 충분.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: ping health endpoint
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -m 30 https://rimi-s76t.onrender.com/api/health || true)
          echo "health=$code"
          # 콜드스타트 중 5xx/타임아웃이어도 실패로 처리하지 않음(깨우는 것 자체가 목적)
